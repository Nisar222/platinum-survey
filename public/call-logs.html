<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call Logs — Campaign Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e8f8fb 0%, #f0edf8 50%, #fce8f3 100%); }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    /* Call list rows */
    .call-row { cursor: pointer; transition: background 0.12s; border-left: 3px solid transparent; }
    .call-row:hover { background: #f0f9ff; }
    .call-row.active { background: #eff6ff; border-left-color: #3b82f6; }

    /* Tabs */
    .tab-btn { border-bottom: 2px solid transparent; color: #6b7280; }
    .tab-btn.active { border-bottom-color: #3b82f6; color: #2563eb; font-weight: 600; }

    /* Transcript bubbles */
    .transcript-bubble-assistant { background: #eff6ff; border-radius: 0 12px 12px 12px; }
    .transcript-bubble-caller    { background: #f3f4f6; border-radius: 12px 0 12px 12px; }

    /* Sticky group header */
    .group-header { position: sticky; top: 0; z-index: 1; }

    /* Drag handle */
    #dragHandle {
      width: 6px;
      cursor: col-resize;
      background: transparent;
      flex-shrink: 0;
      position: relative;
      transition: background 0.15s;
    }
    #dragHandle:hover,
    #dragHandle.dragging { background: #bfdbfe; }
    #dragHandle::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 2px;
      height: 40px;
      background: #cbd5e1;
      border-radius: 2px;
    }
    #dragHandle:hover::after,
    #dragHandle.dragging::after { background: #3b82f6; }
  </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

  <!-- Top Header -->
  <header class="bg-white border-b border-gray-200 px-5 py-3 flex items-center justify-between flex-shrink-0 shadow-sm">
    <div class="flex items-center gap-3">
      <a href="/" class="flex items-center gap-1.5 text-gray-400 hover:text-gray-600 text-sm transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Dashboard
      </a>
      <div class="w-px h-4 bg-gray-200"></div>
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-blue-100 rounded-xl flex items-center justify-center">
          <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        </div>
        <div>
          <h1 class="text-sm font-bold text-gray-900 leading-none">Call Logs</h1>
          <span id="summaryText" class="text-xs text-gray-400"></span>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <select id="filterCampaign" class="text-xs border border-gray-200 rounded-lg px-2.5 py-1.5 outline-none focus:border-blue-400 bg-white text-gray-700">
        <option value="">All Campaigns</option>
      </select>
      <input type="date" id="filterFrom" class="text-xs border border-gray-200 rounded-lg px-2.5 py-1.5 outline-none focus:border-blue-400 text-gray-700" />
      <input type="date" id="filterTo"   class="text-xs border border-gray-200 rounded-lg px-2.5 py-1.5 outline-none focus:border-blue-400 text-gray-700" />
      <button id="applyFilters" class="px-3 py-1.5 bg-blue-500 hover:bg-blue-600 text-white text-xs font-semibold rounded-lg transition-all">Apply</button>
      <button id="exportCsv" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-600 text-xs font-semibold rounded-lg transition-all flex items-center gap-1">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Export CSV
      </button>
    </div>
  </header>

  <!-- Main split layout with padding/margin for dashboard feel -->
  <div class="flex flex-1 min-h-0 p-6 gap-0 overflow-hidden">

    <!-- LEFT: Call list panel -->
    <div id="leftPanel" class="flex flex-col min-h-0 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden" style="width: 340px; min-width: 200px; max-width: 60%;">
      <div class="px-4 py-2.5 border-b border-gray-100 bg-gray-50 flex-shrink-0">
        <span class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Calls</span>
      </div>
      <div class="flex-1 overflow-y-auto">
        <div id="callGroups"></div>
        <div id="loadingState" class="flex items-center justify-center h-40 text-gray-400">
          <div class="text-center">
            <svg class="w-6 h-6 mx-auto mb-2 animate-spin text-blue-400" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
            <p class="text-xs">Loading...</p>
          </div>
        </div>
        <div id="emptyState" class="hidden flex items-center justify-center h-40 text-gray-400">
          <p class="text-xs">No calls found</p>
        </div>
      </div>
    </div>

    <!-- Drag handle -->
    <div id="dragHandle" class="flex-shrink-0 mx-1"></div>

    <!-- RIGHT: Detail panel -->
    <div id="rightPanel" class="flex-1 flex flex-col min-h-0 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden" style="min-width: 200px;">

      <!-- Empty state -->
      <div id="noSelection" class="flex-1 flex items-center justify-center text-gray-300">
        <div class="text-center">
          <svg class="w-12 h-12 mx-auto mb-3 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.948V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
          <p class="text-sm text-gray-400">Select a call to view details</p>
        </div>
      </div>

      <!-- Call detail -->
      <div id="callDetail" class="hidden flex-1 flex flex-col min-h-0">

        <!-- Detail header -->
        <div class="px-6 py-4 border-b border-gray-100 flex-shrink-0 bg-gray-50">
          <div class="text-xs text-gray-400 mb-1">Details for call started at <span id="detailTime" class="font-medium text-gray-600"></span></div>
          <div class="flex flex-wrap items-center gap-3 mt-1">
            <span class="text-xs font-semibold text-gray-500">Call Type: <span class="text-gray-800">Outbound</span></span>
            <span class="text-xs font-semibold text-gray-500">Customer: <span id="detailName" class="text-gray-800"></span></span>
            <span class="text-xs font-semibold text-gray-500">Number: <span id="detailPhone" class="text-gray-800"></span></span>
          </div>
          <div class="flex flex-wrap items-center gap-2 mt-2">
            <span id="detailCampaign" class="text-xs bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full font-medium"></span>
            <span id="detailDisposition"></span>
            <span id="detailDuration" class="text-xs text-gray-400"></span>
          </div>
        </div>

        <!-- Audio player -->
        <div id="audioSection" class="px-6 py-3 border-b border-gray-100 flex-shrink-0 hidden">
          <audio id="audioPlayer" controls class="w-full h-8 rounded"></audio>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-gray-100 px-6 flex-shrink-0 bg-white">
          <button class="tab-btn py-2.5 mr-6 text-sm" data-tab="transcript">Transcript</button>
          <button class="tab-btn py-2.5 px-0 text-sm" data-tab="analysis">Analysis</button>
        </div>

        <!-- Tab content -->
        <div class="flex-1 overflow-y-auto">

          <!-- Transcript tab -->
          <div id="tab-transcript" class="p-6">
            <div id="transcriptContent" class="space-y-4"></div>
            <div id="noTranscript" class="hidden text-center py-8 text-gray-400 text-sm">No transcript available for this call</div>
          </div>

          <!-- Analysis tab -->
          <div id="tab-analysis" class="p-5 space-y-4 hidden">
            <div class="bg-gray-50 rounded-xl p-4">
              <div class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1.5">Call Summary</div>
              <div id="analysisSummary" class="text-sm text-gray-700 leading-relaxed"></div>
            </div>
            <div class="bg-gray-50 rounded-xl p-4">
              <div class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1.5">Feedback Summary</div>
              <div id="analysisFeedback" class="text-sm text-gray-700 leading-relaxed"></div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div class="bg-gray-50 rounded-xl p-3">
                <div class="text-xs text-gray-400 mb-1">Sentiment</div>
                <div id="analysisSentiment" class="text-sm font-semibold text-gray-700"></div>
              </div>
              <div class="bg-gray-50 rounded-xl p-3">
                <div class="text-xs text-gray-400 mb-1">Rating</div>
                <div id="analysisRating" class="text-sm font-semibold text-gray-700"></div>
              </div>
              <div class="bg-gray-50 rounded-xl p-3">
                <div class="text-xs text-gray-400 mb-1">Ended Reason</div>
                <div id="analysisEndedReason" class="text-sm font-semibold text-gray-700"></div>
              </div>
              <div class="bg-gray-50 rounded-xl p-3">
                <div class="text-xs text-gray-400 mb-1">Attempt</div>
                <div id="analysisAttempt" class="text-sm font-semibold text-gray-700"></div>
              </div>
            </div>
            <div id="analysisCallbackSection" class="hidden bg-yellow-50 border border-yellow-100 rounded-xl p-3">
              <div class="text-xs text-yellow-700 font-semibold mb-1">Callback Requested</div>
              <div id="analysisCallbackTime" class="text-sm text-yellow-800"></div>
            </div>
          </div>

        </div>
      </div>
    </div>

  </div>

  <script src="/js/call-logs.js"></script>
  <script>
    // ── Draggable split divider ──────────────────────────────────────────────
    (function () {
      const handle    = document.getElementById('dragHandle');
      const leftPanel = document.getElementById('leftPanel');
      const container = handle.parentElement; // the flex row div
      let dragging = false;
      let startX   = 0;
      let startW   = 0;

      handle.addEventListener('mousedown', e => {
        dragging = true;
        startX   = e.clientX;
        startW   = leftPanel.getBoundingClientRect().width;
        handle.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const delta  = e.clientX - startX;
        const newW   = Math.max(200, Math.min(startW + delta, container.getBoundingClientRect().width * 0.65));
        leftPanel.style.width = newW + 'px';
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      });
    })();
  </script>
</body>
</html>
