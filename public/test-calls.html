<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Calls — Campaign Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e8f8fb 0%, #f0edf8 50%, #fce8f3 100%); }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .call-row { cursor: pointer; transition: background 0.12s; border-left: 3px solid transparent; }
    .call-row:hover { background: #f0f9ff; }
    .call-row.active { background: #eff6ff; border-left-color: #3b82f6; }

    .tab-btn { border-bottom: 2px solid transparent; color: #6b7280; }
    .tab-btn.active { border-bottom-color: #3b82f6; color: #2563eb; font-weight: 600; }

    .transcript-bubble-assistant { background: #eff6ff; border-radius: 0 12px 12px 12px; }
    .transcript-bubble-caller    { background: #f3f4f6; border-radius: 12px 0 12px 12px; }

    #dragHandle {
      width: 6px;
      cursor: col-resize;
      background: transparent;
      flex-shrink: 0;
      position: relative;
      transition: background 0.15s;
    }
    #dragHandle:hover,
    #dragHandle.dragging { background: #bfdbfe; }
    #dragHandle::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 2px;
      height: 40px;
      background: #cbd5e1;
      border-radius: 2px;
    }
    #dragHandle:hover::after,
    #dragHandle.dragging::after { background: #3b82f6; }
  </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

  <!-- Top Header -->
  <header class="bg-white border-b border-gray-200 px-5 py-3 flex items-center justify-between flex-shrink-0 shadow-sm">
    <div class="flex items-center gap-3">
      <a href="/" class="flex items-center gap-1.5 text-gray-400 hover:text-gray-600 text-sm transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Dashboard
      </a>
      <div class="w-px h-4 bg-gray-200"></div>
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-purple-100 rounded-xl flex items-center justify-center">
          <svg class="w-4 h-4 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.948V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
        </div>
        <div>
          <h1 class="text-sm font-bold text-gray-900 leading-none">Test Calls</h1>
          <span id="summaryText" class="text-xs text-gray-400">Manual / single calls</span>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="logout()" class="px-3 py-1.5 bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 text-xs font-semibold rounded-lg transition-all flex items-center gap-1">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Logout
      </button>
    </div>
  </header>

  <!-- Main split layout -->
  <div class="flex flex-1 min-h-0 p-6 gap-0 overflow-hidden">

    <!-- LEFT: Call list panel -->
    <div id="leftPanel" class="flex flex-col min-h-0 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden" style="width: 340px; min-width: 200px; max-width: 60%;">
      <div class="px-4 py-2.5 border-b border-gray-100 bg-gray-50 flex-shrink-0">
        <span class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Test Calls</span>
      </div>
      <div class="flex-1 overflow-y-auto">
        <div id="callList"></div>
        <div id="loadingState" class="flex items-center justify-center h-40 text-gray-400">
          <div class="text-center">
            <svg class="w-6 h-6 mx-auto mb-2 animate-spin text-blue-400" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
            <p class="text-xs">Loading...</p>
          </div>
        </div>
        <div id="emptyState" class="hidden flex items-center justify-center h-40 text-gray-400">
          <p class="text-xs">No test calls yet</p>
        </div>
      </div>
    </div>

    <!-- Drag handle -->
    <div id="dragHandle" class="flex-shrink-0 mx-1"></div>

    <!-- RIGHT: Detail panel -->
    <div id="rightPanel" class="flex-1 flex flex-col min-h-0 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden" style="min-width: 200px;">

      <!-- Empty state -->
      <div id="noSelection" class="flex-1 flex items-center justify-center text-gray-300">
        <div class="text-center">
          <svg class="w-12 h-12 mx-auto mb-3 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.948V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
          <p class="text-sm text-gray-400">Select a call to view details</p>
        </div>
      </div>

      <!-- Call detail -->
      <div id="callDetail" class="hidden flex-1 flex flex-col min-h-0">

        <!-- Detail header -->
        <div class="px-6 py-4 border-b border-gray-100 flex-shrink-0 bg-gray-50">
          <div class="text-xs text-gray-400 mb-1">Test call started at <span id="detailTime" class="font-medium text-gray-600"></span></div>
          <div class="flex flex-wrap items-center gap-3 mt-1">
            <span class="text-xs font-semibold text-gray-500">Call Type: <span class="text-gray-800">Outbound (Manual)</span></span>
            <span class="text-xs font-semibold text-gray-500">Customer: <span id="detailName" class="text-gray-800"></span></span>
            <span class="text-xs font-semibold text-gray-500">Number: <span id="detailPhone" class="text-gray-800"></span></span>
          </div>
          <div class="flex flex-wrap items-center gap-2 mt-2">
            <span id="detailDisposition"></span>
            <span id="detailDuration" class="text-xs text-gray-400"></span>
          </div>
        </div>

        <!-- Audio player -->
        <div id="audioSection" class="px-6 py-3 border-b border-gray-100 flex-shrink-0 hidden">
          <audio id="audioPlayer" controls class="w-full h-8 rounded"></audio>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-gray-100 px-6 flex-shrink-0 bg-white">
          <button class="tab-btn py-2.5 mr-6 text-sm" data-tab="transcript">Transcript</button>
          <button class="tab-btn py-2.5 px-0 text-sm" data-tab="analysis">Analysis</button>
        </div>

        <!-- Tab content -->
        <div class="flex-1 overflow-y-auto">

          <!-- Transcript tab -->
          <div id="tab-transcript" class="p-6">
            <div id="transcriptContent" class="space-y-4"></div>
            <div id="noTranscript" class="hidden text-center py-8 text-gray-400 text-sm">No transcript available</div>
          </div>

          <!-- Analysis tab -->
          <div id="tab-analysis" class="p-5 space-y-4 hidden">
            <div class="bg-gray-50 rounded-xl p-4">
              <div class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1.5">Call Summary</div>
              <div id="analysisSummary" class="text-sm text-gray-700 leading-relaxed"></div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div class="bg-gray-50 rounded-xl p-3">
                <div class="text-xs text-gray-400 mb-1">Sentiment</div>
                <div id="analysisSentiment" class="text-sm font-semibold text-gray-700"></div>
              </div>
              <div class="bg-gray-50 rounded-xl p-3">
                <div class="text-xs text-gray-400 mb-1">Rating</div>
                <div id="analysisRating" class="text-sm font-semibold text-gray-700"></div>
              </div>
              <div class="bg-gray-50 rounded-xl p-3">
                <div class="text-xs text-gray-400 mb-1">Ended Reason</div>
                <div id="analysisEndedReason" class="text-sm font-semibold text-gray-700"></div>
              </div>
              <div class="bg-gray-50 rounded-xl p-3">
                <div class="text-xs text-gray-400 mb-1">Disposition</div>
                <div id="analysisDisposition" class="text-sm font-semibold text-gray-700"></div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>

  </div>

  <script>
    let allCalls = [];
    let selectedId = null;

    function formatDuration(secs) {
      if (!secs) return '';
      const m = Math.floor(secs / 60), s = secs % 60;
      return m > 0 ? `${m}m ${s}s` : `${s}s`;
    }

    function formatDate(ts) {
      if (!ts) return '—';
      const d = new Date(ts + (ts.includes('T') ? '' : 'Z'));
      return d.toLocaleString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true });
    }

    function dispositionBadge(d) {
      const map = {
        completed: 'bg-green-100 text-green-700',
        incomplete: 'bg-orange-100 text-orange-700',
        no_answer: 'bg-gray-100 text-gray-600',
        callback_requested: 'bg-yellow-100 text-yellow-700',
        unknown: 'bg-gray-100 text-gray-500',
      };
      const label = (d || 'unknown').replace(/_/g, ' ');
      const cls = map[(d || '').toLowerCase()] || 'bg-gray-100 text-gray-500';
      return `<span class="text-xs px-2 py-0.5 rounded-full font-medium capitalize ${cls}">${label}</span>`;
    }

    function renderList(calls) {
      const list = document.getElementById('callList');
      document.getElementById('loadingState').classList.add('hidden');

      if (!calls.length) {
        document.getElementById('emptyState').classList.remove('hidden');
        list.innerHTML = '';
        return;
      }

      list.innerHTML = calls.map(c => `
        <div class="call-row px-4 py-3 border-b border-gray-50 ${c.id === selectedId ? 'active' : ''}" data-id="${c.id}" onclick="selectCall(${c.id})">
          <div class="flex items-center justify-between mb-0.5">
            <span class="text-xs font-semibold text-gray-800 truncate">${c.customer_name || '—'}</span>
            ${dispositionBadge(c.call_disposition)}
          </div>
          <div class="text-xs text-gray-400">${c.phone_number || '—'}</div>
          <div class="text-xs text-gray-400 mt-0.5">${formatDate(c.created_at)}${c.duration_seconds ? ' · ' + formatDuration(c.duration_seconds) : ''}</div>
        </div>
      `).join('');

      document.getElementById('summaryText').textContent = `${calls.length} test call${calls.length !== 1 ? 's' : ''}`;
    }

    function selectCall(id) {
      selectedId = id;
      const call = allCalls.find(c => c.id === id);
      if (!call) return;

      // Update active row
      document.querySelectorAll('.call-row').forEach(r => r.classList.toggle('active', parseInt(r.dataset.id) === id));

      document.getElementById('noSelection').classList.add('hidden');
      document.getElementById('callDetail').classList.remove('hidden');

      document.getElementById('detailTime').textContent = formatDate(call.created_at);
      document.getElementById('detailName').textContent = call.customer_name || '—';
      document.getElementById('detailPhone').textContent = call.phone_number || '—';
      document.getElementById('detailDisposition').innerHTML = dispositionBadge(call.call_disposition);
      document.getElementById('detailDuration').textContent = call.duration_seconds ? formatDuration(call.duration_seconds) : '';

      // Audio
      const audioSection = document.getElementById('audioSection');
      if (call.recording_url) {
        document.getElementById('audioPlayer').src = call.recording_url;
        audioSection.classList.remove('hidden');
      } else {
        audioSection.classList.add('hidden');
      }

      // Transcript
      renderTranscript(call.transcript_text);

      // Analysis
      document.getElementById('analysisSummary').textContent = call.call_summary || '—';
      document.getElementById('analysisSentiment').textContent = call.customer_sentiment || '—';
      document.getElementById('analysisRating').textContent = call.rating != null ? call.rating : 'null';
      document.getElementById('analysisEndedReason').textContent = call.ended_reason || '—';
      document.getElementById('analysisDisposition').textContent = call.call_disposition || '—';

      // Default to transcript tab
      switchTab('transcript');
    }

    function renderTranscript(text) {
      const container = document.getElementById('transcriptContent');
      const noTrans = document.getElementById('noTranscript');

      if (!text || !text.trim()) {
        container.innerHTML = '';
        noTrans.classList.remove('hidden');
        return;
      }
      noTrans.classList.add('hidden');

      const botIconSvg = `<svg class="w-5 h-5 text-purple-500" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a2 2 0 012 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 017 7H3a7 7 0 017-7h1V5.73A2 2 0 0112 2M5 19a2 2 0 002 2h10a2 2 0 002-2v-1H5v1M3 14a1 1 0 000 2h18a1 1 0 000-2H3z"/></svg>`;

      const lines = text.split('\n').filter(l => l.trim());
      container.innerHTML = lines.map(line => {
        const isBot = /^(AI|assistant|bot|ayesha):/i.test(line);
        const isUser = /^(user|customer|human):/i.test(line);
        const content = line.replace(/^[^:]+:\s*/, '');
        if (isBot) return `
          <div class="flex items-start gap-2">
            <div class="w-7 h-7 rounded-full bg-purple-100 flex items-center justify-center flex-shrink-0 mt-0.5">${botIconSvg}</div>
            <div class="transcript-bubble-assistant px-3 py-2 max-w-sm"><p class="text-xs text-gray-700 leading-relaxed">${content}</p></div>
          </div>`;
        if (isUser) return `
          <div class="flex items-start gap-2 justify-end">
            <div class="transcript-bubble-caller px-3 py-2 max-w-sm"><p class="text-xs text-gray-700 leading-relaxed">${content}</p></div>
            <div class="w-7 h-7 rounded-full bg-gray-200 flex items-center justify-center flex-shrink-0 mt-0.5"><svg class="w-4 h-4 text-gray-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div>
          </div>`;
        return `<div class="text-xs text-gray-400 italic px-2">${line}</div>`;
      }).join('');
    }

    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
      document.getElementById('tab-transcript').classList.toggle('hidden', name !== 'transcript');
      document.getElementById('tab-analysis').classList.toggle('hidden', name !== 'analysis');
    }

    document.addEventListener('click', e => {
      const btn = e.target.closest('.tab-btn');
      if (btn) switchTab(btn.dataset.tab);
    });

    async function loadCalls() {
      try {
        const res = await fetch('/api/campaigns/test-calls');
        if (res.status === 401) { window.location.href = '/login'; return; }
        allCalls = await res.json();
        renderList(allCalls);
      } catch (e) {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('emptyState').classList.remove('hidden');
      }
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login';
    }

    loadCalls();

    // Draggable divider
    (function () {
      const handle    = document.getElementById('dragHandle');
      const leftPanel = document.getElementById('leftPanel');
      const container = handle.parentElement;
      let dragging = false, startX = 0, startW = 0;
      handle.addEventListener('mousedown', e => {
        dragging = true; startX = e.clientX; startW = leftPanel.getBoundingClientRect().width;
        handle.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });
      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const newW = Math.max(200, Math.min(startW + e.clientX - startX, container.getBoundingClientRect().width * 0.65));
        leftPanel.style.width = newW + 'px';
      });
      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      });
    })();
  </script>
</body>
</html>
