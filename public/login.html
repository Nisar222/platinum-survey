<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platinum Survey — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ayn-teal': '#2BB8D1',
                        'ayn-purple': '#6B4D9C',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm mx-4">
        <!-- Logo / Brand -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4" style="background: linear-gradient(135deg, #2BB8D1, #6B4D9C);">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Platinum Survey</h1>
            <p class="text-gray-500 text-sm mt-1">Sign in to continue</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
                    <input
                        type="text"
                        id="username"
                        autocomplete="username"
                        required
                        class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-ayn-teal focus:border-transparent transition"
                        placeholder="Enter username"
                    />
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                    <input
                        type="password"
                        id="password"
                        autocomplete="current-password"
                        required
                        class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-ayn-teal focus:border-transparent transition"
                        placeholder="Enter password"
                    />
                </div>

                <!-- Error message -->
                <div id="errorMsg" class="hidden mb-4 px-4 py-3 rounded-xl bg-red-50 border border-red-100 text-red-600 text-sm"></div>

                <button
                    type="submit"
                    id="submitBtn"
                    class="w-full py-2.5 rounded-xl text-white text-sm font-semibold transition"
                    style="background: linear-gradient(135deg, #2BB8D1, #6B4D9C);"
                >
                    Sign In
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-gray-400 mt-6">Platinum Insurance Broker L.L.C</p>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            btn.textContent = 'Signing in...';
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.error || 'Invalid credentials';
                    errorMsg.classList.remove('hidden');
                    btn.textContent = 'Sign In';
                    btn.disabled = false;
                }
            } catch (err) {
                errorMsg.textContent = 'Connection error. Please try again.';
                errorMsg.classList.remove('hidden');
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
